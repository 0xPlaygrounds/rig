    value: application/json
  body: '{"content":[{"text":"# 🍽️ Dinner Party Menu for 8\n### Dietary Key: 🌿 Vegetarian | 🌾 Gluten-Free\n\n> **Strategy:** All appetizers, sides, and desserts are safe for **everyone**. The main course offers a dedicated vegetarian option alongside the meat dish, so no one feels like an afterthought.\n\n---\n\n## 🥗 Appetizers\n*All three are vegetarian & gluten-free — no one misses out!*\n\n| Dish | Description | Dietary |\n|------|-------------|---------|\n| **Caprese Skewers** | Fresh mozzarella, cherry tomatoes & basil, drizzled with aged balsamic glaze & extra virgin olive oil | 🌿 🌾 |\n| **Stuffed Mini Sweet Peppers** | Roasted garlic & herb cream cheese, topped with fresh chives | 🌿 🌾 |\n| **Chilled Shrimp Cocktail** | Jumbo shrimp with homemade zesty cocktail sauce (lemon, horseradish, tomato) | 🌾 |\n\n> 💡 **Tip:** Vegetarians can enjoy all three appetizers. Increase the pepper and caprese quantities slightly to ensure a filling spread for them.\n\n---\n\n## 🍖🌾 Main Course\n\n### For the Non-Vegetarians (6 guests)\n**🥩 Herb-Crusted Beef Tenderloin with Red Wine Reduction** 🌾\n- Coated in fresh rosemary, thyme, garlic, and Dijon mustard (check label for GF)\n- Seared and oven-roasted to a perfect medium-rare\n- Finished with a rich, gluten-free red wine & shallot reduction\n\n### For the Vegetarians (2 guests — but everyone will want some!)\n**🍄 Wild Mushroom & Parmesan Risotto** 🌿 🌾\n- Arborio rice with a medley of cremini, shiitake & porcini mushrooms\n- Finished with dry white wine, parmesan, and a drizzle of truffle oil\n- *Naturally gluten-free and deeply satisfying*\n\n---\n\n### 🥦 Sides *(Safe for all 8 guests)*\n\n| Side Dish | Description | Dietary |\n|-----------|-------------|---------|\n| **Garlic & Herb Roasted Baby Potatoes** | Crispy potatoes with rosemary, garlic, and sea salt | 🌿 🌾 |\n| **Honey-Glazed Roasted Asparagus & Carrots** | Caramelized with olive oil, honey & a squeeze of lemon | 🌿 🌾 |\n| **Arugula Salad with Shaved Parmesan** | Peppery arugula, cherry tomatoes & a bright lemon vinaigrette | 🌿 🌾 |\n\n---\n\n## 🍰 Desserts\n*Both desserts are designed to be enjoyed by every single guest.*\n\n| Dish | Description | Dietary |\n|------|-------------|---------|\n| **Flourless Dark Chocolate Torte** | Rich, fudgy torte served with fresh raspberry coulis and a dusting of cocoa | 🌿 🌾 |\n| **Fresh Berry Pavlova** | Light meringue topped with whipped cream, strawberries, blueberries & mint | 🌿 🌾 |\n\n> 💡 **Tip:** The Pavlova is a showstopper centerpiece — assemble it at the table for a dramatic effect!\n\n---\n\n## ⚠️ Allergy & Planning Notes\n\n- **Gluten Allergy:** Every dish on this menu is naturally gluten-free. Just double-check labels on: Dijon mustard, soy sauce (if used), and any store-bought cocktail sauce.\n- **Vegetarians:** They can eat every single course except the beef — and the risotto is hearty enough to be a full, satisfying meal.\n- **Cross-contamination:** Use separate serving utensils for the beef and risotto, and prep gluten-free items on clean surfaces.\n- **Serving size tip:** Make a full batch of risotto — even non-vegetarians will want to try it as a side!\n\n---\n\n### 🛒 Quick Shopping Categories\n1. **Proteins:** Beef tenderloin, jumbo shrimp, arborio rice, assorted mushrooms\n2. **Dairy:** Fresh mozzarella, cream cheese, parmesan, heavy cream\n3. **Produce:** Mini sweet peppers, cherry tomatoes, asparagus, carrots, baby potatoes, arugula, fresh berries, fresh herbs\n4. **Pantry:** Balsamic glaze, red wine, truffle oil, cocoa powder, cornstarch (for pavlova)\n\nEnjoy your dinner party! 🎉","type":"text"}],"id":"msg_REDACTED_2","model":"claude-sonnet-4-6","role":"assistant","stop_details":null,"stop_reason":"end_turn","stop_sequence":null,"type":"message","usage":{"cache_creation":{"ephemeral_1h_input_tokens":0,"ephemeral_5m_input_tokens":0},"cache_creation_input_tokens":0,"cache_read_input_tokens":0,"inference_geo":"global","input_tokens":3056,"output_tokens":1198,"service_tier":"standard"}}'
