    data: {"content_index":1,"item_id":"msg_REDACTED_2","logprobs":[],"output_index":1,"sequence_number":18,"text":"A solar eclipse happens when the Moon moves directly between the Earth and the Sun, casting its shadow on Earth and temporarily blocking the Sun’s light. Depending on the alignment, the Moon can cover the entire solar disc—creating a total eclipse—part of it—making a partial eclipse—or leave a bright ring of Sun visible around the Moon’s silhouette, an annular eclipse. The event is visible only from specific narrow regions on Earth that lie beneath the Moon’s shadow, and it can last from a few seconds to a few minutes for totality or for a full daylight reduction. During the brief darkness, temperatures drop, the sky darkens, and the Sun’s corona may become visible in total eclipses.","type":"response.output_text.done"}

