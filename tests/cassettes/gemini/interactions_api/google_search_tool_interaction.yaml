e goal for England in the 73rd minute.\n*   **Individual Awards:**\n    *   **Player of the Tournament:** Rodri (Spain)\n    *   **Young Player of the Tournament:** Lamine Yamal (Spain), who turned 17 just the day before the final.\n    *   **Top Scorers:** Six players shared the Golden Boot with three goals each, including Spain’s Dani Olmo and England’s Harry Kane.","annotations":[{"start_index":0,"end_index":39,"url":"https://vertexaisearch.cloud.google.com/grounding-api-redirect/AUZIYQFQ2CTEA9FstbHcUMIzbjY6frnJxyBUfLO_6nRNOLaHJ6yJQehu_vLzq12FcvOxr1NsWzih6CRyK6tm9vc-mL1Ier4z43vedHBuqKPKaprqMtPK6Rrn1thFoPHZfb929WeKUU62nQ==","title":"youtube.com","type":"url_citation"},{"start_index":0,"end_index":39,"url":"https://vertexaisearch.cloud.google.com/grounding-api-redirect/AUZIYQFvTMrshcfz_593N1t6nVzNHDc3pfOQdVdrkJOLIw9GWLaqO0cpoIQ72W09j7kjvnRVfG36_1xM2CZkSEVdzrL5Dmfh0_khNdnHRv_X9koD9y0U5yZ_3A0rsJCtsrI1mrFBYT7V0A==","title":"youtube.com","type":"url_citation"},{"start_index":0,"end_index":39,"url":"https://vertexaisearch.cloud.google.com/grounding-api-redirect/AUZIYQFuCxJbHa62zENBRD-xWZ3g3NErp9jmk8qTW4Jybiq7GpR-FdfmJMunA3UDvPPmLiGHzx2wogkyyCSBjxw-KNB_ZcqTcnB2dn_F3pRMQ3WLXHPXxbpo_GZVBe29fUGDYXF7m66KprTqfHXrPIe6ToreH8WdRRHVjDTmWiuQ_FCods8FZ8Pfm9oXEYbuDoOJk2rYsxGONjLc6R3k","title":"olympics.com","type":"url_citation"},{"start_index":0,"end_index":39,"url":"https://vertexaisearch.cloud.google.com/grounding-api-redirect/AUZIYQEuESy8d9q0QUMvW3xL9VRr1JhSoBilCFWMtK18SPFnS3l1pPw89-EB6jCagwFPI6s9FPf-mB0ZzUB8uPfHU86qpR5AGXazkFTbwJoLeUAGrwadCIRoMzdkW2L8UEqPJHXUrvWXENuPH4ZGDIyVRslWk8bnP3ICFm3p5vt-tnZVdbXZXArnIGCvalIZYyrDNK7QHfZShw8wMRGRraMIOlqmYp8I9AHSgw9xLlNTkHq_","title":"aljazeera.com","type":"url_citation"},{"start_index":0,"end_index":39,"url":"https://vertexaisearch.cloud.google.com/grounding-api-redirect/AUZIYQH_u2FF-gM0ky8DwEKuurRVohS5qqTo5_OkXmBI163Y-IOA6JDN5zu8AJUZrjHOD50Wsz4S3tJc4gFCDW9L0oiYboDyMz0gY4E4Lv_YUXkP7yiwrLI-FXDRJimjRdGeSpPg5QTSforuXS0NZgU=","title":"wikipedia.