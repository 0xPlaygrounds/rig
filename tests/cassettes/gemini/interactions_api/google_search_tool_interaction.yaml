 scored the winning goal for Spain in the 86th minute.\n*   **Record-Breaking Win:** This was Spain’s fourth European Championship title (following wins in 1964, 2008, and 2012), making them the most successful team in the history of the competition.\n*   **Perfect Tournament:** Spain became the first team to win all seven matches in a single Euro tournament without needing a penalty shootout.\n\n### Notable Awards:\n*   **Player of the Tournament:** Rodri (Spain)\n*   **Young Player of the Tournament:** Lamine Yamal (Spain), who turned 17 just one day before the final.\n*   **Top Scorers:** Six players shared the Golden Boot with three goals each: Dani Olmo (Spain), Harry Kane (England), Georges Mikautadze (Georgia), Jamal Musiala (Germany), Cody Gakpo (Netherlands), and Ivan Schranz (Slovakia).","annotations":[{"start_index":0,"end_index":44,"url":"https://vertexaisearch.cloud.google.com/grounding-api-redirect/AUZIYQGcvfaqcK7DacFA2MAx0byig-NyhzAVv8fF4u3k0uMblkJnJVZ9Qg_J61MrvmyG0X1yRAG7khfHm-jEOIPNZpOhxoknXZbVkrmsJap7MYCquDO11iYk12QoSBUFge9yN32HxZxA-RtZa58M6Dwzz1FEEnRT1qYnQ70Ff9pblVbAOe-F4nVKQJ97vvkDIwZa7NY7b--NjzLP_ZsipQ==","title":"olympics.com","type":"url_citation"},{"start_index":0,"end_index":44,"url":"https://vertexaisearch.cloud.google.com/grounding-api-redirect/AUZIYQHhLbz8I9-VTdYL2ytYX0j8LtWjgIolocoPLkGrf6EAGB5VEo_wz0UQVeaQMVbze6hk_IUqYuYBwMt5pR3hd2BdjcxoXZqMxZhkjOspT_NAYHlDQfDai64QpwgQtNbtwKP3fi9Tdr8nwgPYCIv0gpgIaj2C_np13SQ0u3zw_-zllFXEjMk6gN8C1L-7rs2xlma-tSImJn8LGPF4qryC_4UXXmTKMA==","title":"foxsports.com","type":"url_citation"},{"start_index":0,"end_index":44,"url":"https://vertexaisearch.cloud.google.com/grounding-api-redirect/AUZIYQH9jl3yuy14X-AUnydHEoe8dSTUkWwvFagCnI_E8pFXIcNfWCDuhtrCWmC3Y3eQPH636jgK-AABJWB_cwfphmqFcN_O0xOkA2W4FvOHhqWVZt5Gn9WjNIg7BfBuqjwaORl1vQZzZiU=","title":"youtube.com","type":"url_citation"},{"start_index":0,"end_index":44,"url":"https://vertexaisearch.cloud.google.com/grounding-api-redirect/AUZIYQFzmwJmwOapru-yCHKWyGh7VtEIu5nX