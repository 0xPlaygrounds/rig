t team to do so without needing a penalty shootout.\n*   **Individual Awards:** \n    *   **Rodri** (Spain) was named the Player of the Tournament.\n    *   **Lamine Yamal** (Spain) was named the Young Player of the Tournament, having turned 17 just one day before the final.","annotations":[{"start_index":0,"end_index":44,"url":"https://vertexaisearch.cloud.google.com/grounding-api-redirect/AUZIYQEmvLj2_Xgyj9qA6R2SJZmDCGQn_F6CuztWzTdKKG266xep36BbFPZk57efy31UA9maRAz96wdbY-hRuiDrJWg7rblESFJyK12vf0L1nqlv_vXAQcZlysHt9wk8Blm3Ni0eQbs9vTFHdANi8h4DqLUqS3MyOTHgTlqGH7b-1fJYDl5xD9cr2wZ35pyGz5HSSD5AIR51nBJXSrojcg==","title":"olympics.com","type":"url_citation"},{"start_index":0,"end_index":44,"url":"https://vertexaisearch.cloud.google.com/grounding-api-redirect/AUZIYQF6pTyGIDdXu8VeQxIUZmgmPm91avzfVes5EgVTz6Fkyp4n2IcR-P1jrCWll0sdQ0J4Kw2udYPeqSJQfIHcH27iYuLrul1CQazf03M7DcGEPJWxGhGuhRadb9TD7mGc8WJ9JEZLzHk=","title":"youtube.com","type":"url_citation"},{"start_index":0,"end_index":44,"url":"https://vertexaisearch.cloud.google.com/grounding-api-redirect/AUZIYQFYCzLq9o2sobbm1xG_TbtGH0CWUjMGvK-BsqkHu1jpp1WBVESAmqzzHJbkHCE-F47hvoxNbnRjpVUj8jQ9N1kO_hIEthAfikn8As0589F1uUyi56z_tcOZ8OV0mUfo2styLILqrkLGRX2lAtCuw8ZUzaq1","title":"wikipedia.org","type":"url_citation"},{"start_index":0,"end_index":44,"url":"https://vertexaisearch.cloud.google.com/grounding-api-redirect/AUZIYQFZbOR6xXUrSsMj-o2gmZjkPP0sfsgLAJxY03C9JMLl8SRmp-UKgD6AJK_b2alrwccuiXohQnQqKGoJylTT6cjRC778F_dq206lFF51rEXmSyoR1uzY62mA_UyqKB400VrvczHMWNCHzGTSGn5J","title":"wikipedia.org","type":"url_citation"},{"start_index":46,"end_index":181,"url":"https://vertexaisearch.cloud.google.com/grounding-api-redirect/AUZIYQEmvLj2_Xgyj9qA6R2SJZmDCGQn_F6CuztWzTdKKG266xep36BbFPZk57efy31UA9maRAz96wdbY-hRuiDrJWg7rblESFJyK12vf0L1nqlv_vXAQcZlysHt9wk8Blm3Ni0eQbs9vTFHdANi8h4DqLUqS3MyOTHgTlqGH7b-1fJYDl5xD9cr2wZ35pyGz5HSSD5AIR51nBJXSrojcg==","title":"olympics.com","type":"url_citation"},{"start_index":610,"end_index":755,"url":"https://vertexaisearch.cl