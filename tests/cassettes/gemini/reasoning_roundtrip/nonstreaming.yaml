                "text": "Let $t$ be the time in hours after the first train leaves Station A.\n\n1.  **Set up distance equations:**\n    *   Distance covered by Train A: $d_A = 60t$\n    *   Train B leaves 30 minutes (0.5 hours) later, so its travel time is $(t - 0.5)$ hours.\n    *   Distance covered by Train B: $d_B = 90(t - 0.5)$\n\n2.  **Formulate the meeting condition:**\n    When the trains meet, the sum of their distances equals the total distance between the stations (300 km):\n    $d_A + d_B = 300$\n    $60t + 90(t - 0.5) = 300$\n\n3.  **Solve for $t$:**\n    $60t + 90t - 45 = 300$\n    $150t - 45 = 300$\n    $150t = 345$\n    $t = \\frac{345}{150} = 2.3$ hours\n\n4.  **Calculate the meeting time:**\n    $2.3$ hours is $2$ hours and $0.3 \\times 60 = 18$ minutes.\n    Since no specific departure time for the first train is given, they meet **2 hours and 18 minutes** after the train from Station A leaves.\n\n5.  **Calculate the distance from Station A:**\n    Substitute $t = 2.3$ hours into the distance equation for Train A:\n    $d_A = 60 \\times 2.3 = 138$ km\n\nThe trains meet **2 hours and 18 minutes after the first train leaves Station A**, and **138 km from Station A**."
