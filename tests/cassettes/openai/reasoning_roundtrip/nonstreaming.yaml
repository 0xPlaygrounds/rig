              "text": "Let \\(t\\) be hours after Train A leaves.\n\n**Speeds with slowdown**\n- Train A: \\(60\\) km/h until it has gone \\(150\\) km, then \\(50\\) km/h.  \n  Time to reach 150 km: \\(\\frac{150}{60}=2.5\\) h.\n- Train B (leaves at \\(t=0.5\\)): \\(90\\) km/h until it has gone \\(150\\) km, then \\(80\\) km/h.  \n  Time (after its own start) to reach 150 km: \\(\\frac{150}{90}=1.\\overline{6}\\) h, so it slows at\n  \\[\n  t=0.5+ \\frac{150}{90}=0.5+1.\\overline{6}=2.166\\overline{6}\\text{ h.}\n  \\]\n\n### 1) Separation when Train B starts\nAt \\(t=0.5\\), Train A has gone \\(60(0.5)=30\\) km, so remaining distance is\n\\[\n300-30=270\\text{ km.}\n\\]\n\n### 2) From \\(t=0.5\\) to \\(t=2.166\\overline{6}\\) (before B slows)\nDuration: \\(2.166\\overline{6}-0.5=1.\\overline{6}\\) h.\n\nClosing speed: \\(60+90=150\\) km/h, so distance closed is\n\\[\n150\\left(1.\\overline{6}\\right)=150\\cdot\\frac{5}{3}=250\\text{ km.}\n\\]\nRemaining separation at \\(t=2.166\\overline{6}\\):\n\\[\n270-250=20\\text{ km.}\n\\]\n\n### 3) After \\(t=2.166\\overline{6}\\) (B slowed, A not yet)\nAt this time, A has only gone \\(30 + 60\\left(1.\\overline{6}\\right)=30+100=130\\) km, so A has **not** reached 150 km yet (it won\u2019t slow until \\(t=2.5\\) h).\n\nSo for the remaining 20 km:\n- A speed \\(=60\\)\n- B speed \\(=80\\)\n- Closing speed \\(=60+80=140\\) km/h\n\nTime to meet:\n\\[\n\\Delta t=\\frac{20}{140}=\\frac{1}{7}\\text{ h }=0.142857\\text{ h }=8.571\\text{ min}\n\\]\nSo meeting time (after A leaves):\n\\[\nt=2.166\\overline{6}+\\frac{1}{7}=2.309523\\text{ h } \\approx 2\\text{ h }18\\text{ min }34\\text{ s.}\n\\]\n\n**They meet \\(\\boxed{2\\text{ h }18\\text{ min }34\\text{ s}}\\) after Train A leaves** (equivalently \\(\\boxed{1\\text{ h }48\\text{ min }34\\text{ s}}\\) after Train B leaves)."
