              "text": "Let \\(t\\) be the time (hours) after Train A leaves until they meet. Stations are 300 km apart.\n\n**Speed changes (each train slows after it has traveled 150 km):**\n- Train A: \\(60\\) km/h for first 150 km, then \\(50\\) km/h.\n- Train B: leaves \\(0.5\\) h later; \\(90\\) km/h for first 150 km, then \\(80\\) km/h.\n\n### 1) When does Train B slow down? (measured from A\u2019s start)\nTime for B to go 150 km at 90 km/h:\n\\[\n\\frac{150}{90}=\\frac{5}{3}\\text{ h}\n\\]\nSo B slows at\n\\[\n0.5+\\frac{5}{3}=\\frac{1}{2}+\\frac{5}{3}=\\frac{13}{6}\\text{ h} \\approx 2.1667\\text{ h}\n\\]\n\nAt \\(t=\\frac{13}{6}\\), Train A has gone:\n\\[\n60\\cdot \\frac{13}{6}=130\\text{ km}\n\\]\nTrain B has gone 150 km from B, so it is at \\(300-150=150\\) km from A.\n\nSo the gap between them then is:\n\\[\n150-130=20\\text{ km}\n\\]\n\n### 2) After that moment, what are their speeds?\nFor \\(t\\in\\left[\\frac{13}{6},\\,2.5\\right]\\), Train A is still at 60 km/h (since it doesn\u2019t reach 150 km until \\(150/60=2.5\\) h), and Train B is now 80 km/h.\n\nClosing speed:\n\\[\n60+80=140\\text{ km/h}\n\\]\nTime to close 20 km:\n\\[\n\\frac{20}{140}=\\frac{1}{7}\\text{ h}\n\\]\n\n### 3) Meeting time\n\\[\nt=\\frac{13}{6}+\\frac{1}{7}=\\frac{91}{42}+\\frac{6}{42}=\\frac{97}{42}\\text{ h}\\approx 2.3095238\\text{ h}\n\\]\nThat is \\(2\\) hours plus\n\\[\n0.3095238\\cdot 60 \\approx 18.5714\\text{ min} \\approx 18\\text{ min }34\\text{ s}\n\\]\n\n**They meet \\(\\boxed{2\\text{ h }18\\text{ min }34\\text{ s}}\\) after Train A leaves** (equivalently \\(\\boxed{1\\text{ h }48\\text{ min }34\\text{ s}}\\) after Train B leaves).\n\n(If you want the location too: \\(60\\cdot \\frac{97}{42}=\\frac{970}{7}\\approx 138.57\\) km from Station A.)"
