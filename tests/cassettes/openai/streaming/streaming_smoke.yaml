    event: response.output_text.done
    data: {"type":"response.output_text.done","content_index":0,"item_id":"msg_02e28d3a4ca3fe1f006a041e479238819c9bd0c29bb82debee","logprobs":[],"output_index":0,"sequence_number":108,"text":"A solar eclipse occurs when the Moon passes between the Earth and the Sun, temporarily blocking the Sun's light. This alignment causes the Moon to cast a shadow on parts of the Earth, leading to a total, partial, or annular eclipse, depending on the distances and alignments of the three celestial bodies. A total eclipse completely obscures the Sun, while a partial eclipse only covers part of it. An annular eclipse occurs when the Moon appears smaller than the Sun, creating a \"ring of fire\" effect."}

