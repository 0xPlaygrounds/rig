    event: response.output_text.done
    data: {"type":"response.output_text.done","content_index":0,"item_id":"msg_0ad94dc61b0bb528006a04fd5e329c8194b4e9788cc4bf9e87","logprobs":[],"output_index":0,"sequence_number":88,"text":"A solar eclipse occurs when the Moon passes between the Earth and the Sun, blocking all or part of the Sun's light from reaching Earth. This alignment causes a shadow to fall on Earth, resulting in total, partial, or annular eclipses, depending on the distances and positions of the Sun, Moon, and Earth. During a total solar eclipse, the Moon completely covers the Sun, briefly darkening the sky."}

