[package]
name = "rig"
version.workspace = true
edition = { workspace = true }
license = "MIT"
readme = "../../README.md"
description = "An opinionated library for building LLM powered applications."
repository = "https://github.com/0xPlaygrounds/rig"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints]
workspace = true

[dependencies]
rig-core = { path = "../rig-core", version = "0.38.2", default-features = false }
rig-bedrock = { path = "../rig-bedrock", version = "0.38.2", optional = true, default-features = false }
rig-fastembed = { path = "../rig-fastembed", version = "0.38.2", optional = true, default-features = false }
rig-gemini-grpc = { path = "../rig-gemini-grpc", version = "0.38.2", optional = true, default-features = false }
rig-helixdb = { path = "../rig-helixdb", version = "0.38.2", optional = true, default-features = false }
rig-lancedb = { path = "../rig-lancedb", version = "0.38.2", optional = true, default-features = false }
rig-memory = { path = "../rig-memory", version = "0.38.2", optional = true, default-features = false }
rig-milvus = { path = "../rig-milvus", version = "0.38.2", optional = true, default-features = false }
rig-mongodb = { path = "../rig-mongodb", version = "0.38.2", optional = true, default-features = false }
rig-neo4j = { path = "../rig-neo4j", version = "0.38.2", optional = true, default-features = false }
rig-postgres = { path = "../rig-postgres", version = "0.38.2", optional = true, default-features = false }
rig-qdrant = { path = "../rig-qdrant", version = "0.38.2", optional = true, default-features = false }
rig-s3vectors = { path = "../rig-s3vectors", version = "0.38.2", optional = true, default-features = false }
rig-scylladb = { path = "../rig-scylladb", version = "0.38.2", optional = true, default-features = false }
rig-sqlite = { path = "../rig-sqlite", version = "0.38.2", optional = true, default-features = false }
rig-surrealdb = { path = "../rig-surrealdb", version = "0.38.2", optional = true, default-features = false }
rig-vectorize = { path = "../rig-vectorize", version = "0.38.2", optional = true, default-features = false }
rig-vertexai = { path = "../rig-vertexai", version = "0.38.2", optional = true, default-features = false }

[features]
default = ["rig-core/default", "rustls"]
test-utils = ["rig-core/test-utils"]
bedrock = ["dep:rig-bedrock"]
fastembed = [
  "dep:rig-fastembed",
  "rig-fastembed/hf-hub",
  "rig-fastembed/ort-download-binaries",
]
fastembed-hf-hub = ["dep:rig-fastembed", "rig-fastembed/hf-hub"]
fastembed-ort-download-binaries = ["dep:rig-fastembed", "rig-fastembed/ort-download-binaries"]
gemini-grpc = ["dep:rig-gemini-grpc"]
helixdb = ["dep:rig-helixdb"]
lancedb = ["dep:rig-lancedb"]
memory = ["dep:rig-memory"]
milvus = ["dep:rig-milvus"]
mongodb = ["dep:rig-mongodb"]
neo4j = ["dep:rig-neo4j"]
postgres = ["dep:rig-postgres"]
qdrant = ["dep:rig-qdrant"]
s3vectors = ["dep:rig-s3vectors"]
scylladb = ["dep:rig-scylladb"]
sqlite = ["dep:rig-sqlite"]
surrealdb = ["dep:rig-surrealdb"]
vectorize = ["dep:rig-vectorize"]
vertexai = ["dep:rig-vertexai"]
audio = ["rig-core/audio"]
image = ["rig-core/image"]
derive = ["rig-core/derive"]
experimental = ["rig-core/experimental"]
discord-bot = ["rig-core/discord-bot"]
pdf = ["rig-core/pdf"]
epub = ["rig-core/epub"]
rayon = ["rig-core/rayon"]
wasm = ["rig-core/wasm"]
rmcp = ["rig-core/rmcp"]
socks = ["rig-core/socks"]
reqwest = ["rig-core/reqwest"]
websocket = ["rig-core/websocket"]
websocket-rustls = ["rig-core/websocket-rustls"]
websocket-native-tls = ["rig-core/websocket-native-tls"]
rustls = [
  "rig-core/rustls",
  "rig-bedrock?/bedrock-rustls",
  "rig-fastembed?/hf-hub-rustls-tls",
  "rig-helixdb?/rustls",
  "rig-lancedb?/rig-rustls",
  "rig-milvus?/rustls",
]
native-tls = [
  "rig-core/native-tls",
  "rig-fastembed?/hf-hub-native-tls",
  "rig-helixdb?/native-tls",
  "rig-lancedb?/rig-native-tls",
  "rig-milvus?/native-tls",
]
reqwest-middleware = ["rig-core/reqwest-middleware"]
reqwest-middleware-rustls = ["rig-core/reqwest-middleware-rustls"]
reqwest-middleware-native-tls = ["rig-core/reqwest-middleware-native-tls"]

[dev-dependencies]
anyhow = { workspace = true }
arrow-array = { workspace = true }
assert_fs = { workspace = true }
async-stream = { workspace = true }
rig-core = { path = "../rig-core", version = "0.38.2", default-features = false, features = [
  "test-utils",
] }
tokio = { workspace = true, features = ["full"] }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
tokio-test = { workspace = true }
redis = { workspace = true, features = ["tokio-comp", "aio", "vector-sets"] }
serde_path_to_error = { workspace = true }
base64 = { workspace = true }
futures = { workspace = true }
httpmock = { workspace = true, features = ["record", "proxy"] }
lancedb = { workspace = true }
mongodb = { workspace = true }
neo4rs = { workspace = true }
qdrant-client = { workspace = true }
reqwest-retry = { workspace = true }
reqwest = { workspace = true, features = ["json", "stream"] }
reqwest-middleware = { workspace = true, features = [
  "json",
  "multipart",
  "charset",
  "http2",
  "rustls",
] }
schemars = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
syn = { workspace = true, features = ["full", "visit"] }
rusqlite = { workspace = true, features = ["bundled"] }
sqlite-vec = { workspace = true }
sqlx = { workspace = true, features = ["runtime-tokio", "postgres", "uuid", "json"] }
testcontainers = { workspace = true }
thiserror = { workspace = true }
tokio-rusqlite = { workspace = true, features = ["bundled"] }
hyper-util = { workspace = true, features = ["service", "server"] }
rmcp = { workspace = true, features = [
  "client",
  "macros",
  "reqwest",
  "transport-streamable-http-client",
  "transport-streamable-http-client-reqwest",
  "transport-streamable-http-server-session",
  "transport-streamable-http-server",
  "transport-worker",
] }
axum = { workspace = true }
opentelemetry = { workspace = true }
opentelemetry_sdk = { workspace = true, features = ["rt-tokio"] }
opentelemetry-otlp = { workspace = true }
tracing = { workspace = true }
tracing-opentelemetry = { workspace = true }
url = { workspace = true }

[[example]]
name = "rag"
required-features = ["derive"]

[[example]]
name = "reqwest_middleware"
required-features = ["reqwest-middleware"]

[[example]]
name = "rag_ollama"
required-features = ["derive"]

[[example]]
name = "vector_search"
required-features = ["derive"]

[[example]]
name = "vector_search_cohere"
required-features = ["derive"]

[[example]]
name = "pdf_agent"
required-features = ["derive", "pdf"]

[[example]]
name = "rmcp"
required-features = ["rmcp"]

[[example]]
name = "discord_bot"
required-features = ["discord-bot"]

[[example]]
name = "custom_vector_store"

[[example]]
name = "complex_agentic_loop_claude"
required-features = ["derive"]

[[example]]
name = "gemini_extractor_with_rag"
required-features = ["derive"]

[[example]]
name = "gemini_default_api_recovery"
required-features = ["derive"]

[[example]]
name = "vector_search_ollama"
required-features = ["derive"]
