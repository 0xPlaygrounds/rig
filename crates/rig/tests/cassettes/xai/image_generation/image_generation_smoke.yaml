    value: application/json
  body: '{"aspect_ratio":"4:3","model":"grok-imagine-image-pro","prompt":"A lighthouse on a rocky cliff at sunrise, painted in a clean illustrative style.","resolution":"2k","response_format":"b64_json"}'
