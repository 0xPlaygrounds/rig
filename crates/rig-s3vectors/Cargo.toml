[package]
name = "rig-s3vectors"
version.workspace = true
edition = { workspace = true }
description = "AWS S3Vectors vector store implementation for the rig framework"
license = "MIT"

[lints]
workspace = true

[dependencies]
# Disable the generated defaults because they include AWS's legacy Hyper 0.14 connector.
aws-sdk-s3vectors = { version = "1.1.0", default-features = false, features = [
  "default-https-client",
  "rt-tokio",
] }
aws-smithy-types = { workspace = true, features = [
  "serde-deserialize",
  "serde-serialize",
] }
rig-core = { path = "../rig-core", version = "0.40.0", default-features = false, features = [
  "derive",
] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true, features = ["v4"] }

[dev-dependencies]
anyhow = { workspace = true }
aws-config = { workspace = true, features = ["behavior-version-latest"] }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
tracing-subscriber = { workspace = true, features = ["env-filter"] }

[[example]]
name = "s3vectors_vector_search"
required-features = []
