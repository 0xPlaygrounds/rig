[package]
name = "rig-surrealdb"
version.workspace = true
edition = { workspace = true }
description = "SurrealDB vector store implementation for the rig framework"
license = "MIT"

[lints]
workspace = true

[dependencies]
# kv-lance = the AdaWorldAPI SurrealDB-on-Lance backend; kv-mem for tests/dev.
# No kv-rocksdb / kv-tikv — keep the dep tree minimal.
surrealdb = { workspace = true, features = ["protocol-ws", "kv-mem", "kv-lance"] }
rig-core = { path = "../rig-core", version = "0.39.0", default-features = false, features = [
  "derive",
] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true, features = ["v4"] }

[dev-dependencies]
anyhow = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
tracing-subscriber = { workspace = true, features = ["env-filter"] }

[[example]]
name = "vector_search_surreal"
required-features = ["rig-core/derive", "rig-core/rustls"]

[[example]]
name = "vector_store"
required-features = ["rig-core/derive", "rig-core/rustls"]
