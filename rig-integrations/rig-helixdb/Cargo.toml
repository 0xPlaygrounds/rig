[package]
name = "rig-helixdb"
version = "0.2.5"
edition.workspace = true
license = "MIT"
readme = "README.md"
description = "Rig vector store index integration for HelixDB."
repository = "https://github.com/0xPlaygrounds/rig"

[lints]
workspace = true

[dependencies]
reqwest = { workspace = true, features = ["json"] }
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
thiserror = { workspace = true }
rig-core = { path = "../../rig/rig-core", version = "0.36.0", default-features = false }

[dev-dependencies]
anyhow = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }

[features]
default = ["rustls"]
rustls = ["reqwest/rustls", "rig-core/rustls"]
native-tls = ["reqwest/native-tls", "rig-core/native-tls"]

[[example]]
name = "vector_search_helixdb"
required-features = ["rig-core/derive"]
